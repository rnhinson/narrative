# route.yaml
#
# OpenShift Route exposes the bot to Slack's servers over HTTPS.
# Edge termination means TLS is handled by the OpenShift router;
# traffic inside the cluster travels as plain HTTP.
#
# After applying, get the hostname with:
#   oc get route narrative -o jsonpath='{.spec.host}'
#
# Then set the following in your Slack App config
# (api.slack.com → Your App → Event Subscriptions / Interactivity):
#   Request URL: https://<route-hostname>/slack/events
#
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: narrative
  namespace: your-namespace          # match your OC_NAMESPACE
  labels:
    app: narrative
spec:
  # Leave host blank to let OpenShift auto-assign a subdomain,
  # or set it explicitly: e.g. narrative.apps.cluster.example.com
  # host: narrative.apps.cluster.example.com

  to:
    kind: Service
    name: narrative
    weight: 100

  port:
    targetPort: http

  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect   # force HTTP → HTTPS

  wildcardPolicy: None
