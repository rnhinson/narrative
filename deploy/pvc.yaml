# pvc.yaml
#
# Persistent storage for config-store.json (per-channel /point-config data).
# Without this, channel configs are lost on pod restart.
#
# If your cluster has a default StorageClass you can omit storageClassName.
# Common OpenShift values: gp2, gp3, ocs-storagecluster-ceph-rbd
#
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: narrative-data
  namespace: your-namespace          # match your OC_NAMESPACE
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
  storageClassName: gp2          # update to match your cluster's StorageClass
