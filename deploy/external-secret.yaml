# external-secret.yaml
#
# Tells the External Secrets Operator to pull credentials from Vault
# and materialise them as a standard Kubernetes Secret.
#
# Prerequisites:
#   - ESO is installed in the cluster (operatorhub.io/package/external-secrets-operator)
#   - A ClusterSecretStore or SecretStore named "vault-backend" already exists
#     pointing at your Vault instance with appropriate auth (e.g. Kubernetes auth)
#   - The following paths exist in Vault:
#       secret/data/narrative/slack
#       secret/data/narrative/jira
#
# To create the Vault secrets (run once, by a Vault admin):
#
#   vault kv put secret/narrative/slack \
#     bot_token="xoxb-..." \
#     signing_secret="..." \
#     app_token="xapp-..."
#
#   vault kv put secret/narrative/jira \
#     base_url="https://yourcompany.atlassian.net" \
#     email="bot@yourcompany.com" \
#     api_token="..." \
#     target_status="Ready for Sprint" \
#     labels_to_remove="needs-pointing,unpointed" \
#     story_points_field="customfield_10016"
#
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: narrative-secret
  namespace: your-namespace          # match your OC_NAMESPACE
spec:
  refreshInterval: 1h            # how often ESO re-syncs from Vault

  secretStoreRef:
    name: vault-backend          # name of your ClusterSecretStore / SecretStore
    kind: ClusterSecretStore     # or SecretStore if it's namespace-scoped

  target:
    name: narrative-secret # name of the K8s Secret that gets created
    creationPolicy: Owner        # ESO owns and manages this Secret

  data:
    # ── Slack ──────────────────────────────────────────────────────────────
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: secret/narrative/slack
        property: bot_token

    - secretKey: SLACK_SIGNING_SECRET
      remoteRef:
        key: secret/narrative/slack
        property: signing_secret

    - secretKey: SLACK_APP_TOKEN
      remoteRef:
        key: secret/narrative/slack
        property: app_token

    # ── Jira ───────────────────────────────────────────────────────────────
    - secretKey: JIRA_BASE_URL
      remoteRef:
        key: secret/narrative/jira
        property: base_url

    - secretKey: JIRA_EMAIL
      remoteRef:
        key: secret/narrative/jira
        property: email

    - secretKey: JIRA_API_TOKEN
      remoteRef:
        key: secret/narrative/jira
        property: api_token

    - secretKey: JIRA_TARGET_STATUS
      remoteRef:
        key: secret/narrative/jira
        property: target_status

    - secretKey: JIRA_LABELS_TO_REMOVE
      remoteRef:
        key: secret/narrative/jira
        property: labels_to_remove

    - secretKey: JIRA_STORY_POINTS_FIELD
      remoteRef:
        key: secret/narrative/jira
        property: story_points_field
